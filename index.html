<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waxroom — 3D Music Space</title>
    <meta name="description" content="Build, explore, and share your music collection in an interactive 3D vinyl globe. Sync from Last.fm, discover new albums, and share your room with friends." />
    <meta name="theme-color" content="#f5f5f3" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Waxroom — 3D Music Space" />
    <meta property="og:description" content="Build, explore, and share your music collection in an interactive 3D vinyl globe." />
    <meta property="og:image" content="./og-preview.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Waxroom — 3D Music Space" />
    <meta name="twitter:description" content="Build, explore, and share your music collection in an interactive 3D vinyl globe." />
    <meta name="twitter:image" content="./og-preview.png" />
    <!-- Preconnect to asset CDNs and load brand fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet" />

    <style>
      /* Branded loading screen — shown until React hydrates */
      #loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f5f3;
        font-family: 'Satoshi', system-ui, -apple-system, sans-serif;
        transition: opacity 0.5s ease;
      }
      #loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #loader .logo-container {
        position: relative;
        width: 140px;
        height: 140px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #loader .logo-img {
        width: 120px;
        height: 120px;
        animation: spin 6s linear infinite;
        user-select: none;
        -webkit-user-drag: none;
      }
      #loader p {
        margin-top: 24px;
        font-family: 'Syne', sans-serif;
        font-size: 11px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #000000;
        font-weight: 800;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen (removed by React on mount) -->
    <div id="loader">
      <div class="logo-container">
        <img src="./logo only.svg" class="logo-img" alt="Waxroom" />
      </div>
      <p>Loading Waxroom</p>
    </div>

    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
