<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waxroom — 3D Music Space</title>
    <meta name="description" content="Build, explore, and share your music collection in an interactive 3D vinyl globe. Sync from Last.fm, discover new albums, and share your room with friends." />
    <meta name="theme-color" content="#f4f4f2" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Waxroom — 3D Music Space" />
    <meta property="og:description" content="Build, explore, and share your music collection in an interactive 3D vinyl globe." />
    <meta property="og:image" content="./og-preview.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Waxroom — 3D Music Space" />
    <meta name="twitter:description" content="Build, explore, and share your music collection in an interactive 3D vinyl globe." />
    <meta name="twitter:image" content="./og-preview.png" />

    <!-- Preconnect to asset CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      /* Branded loading screen — shown until React hydrates */
      #loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f4f4f2;
        font-family: system-ui, -apple-system, sans-serif;
        transition: opacity 0.5s ease;
      }
      #loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #loader .vinyl-wrapper {
        position: relative;
        width: 180px;
        height: 180px;
        margin: 0 auto;
      }
      #loader .disc {
        position: absolute;
        top: 0;
        left: 0;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: 
          /* Gloss sheen overlay (rotates with disc) */
          conic-gradient(
            from 0deg, 
            rgba(255, 255, 255, 0) 0deg, 
            rgba(255, 255, 255, 0.08) 25deg, 
            rgba(255, 255, 255, 0) 50deg, 
            rgba(255, 255, 255, 0) 180deg, 
            rgba(255, 255, 255, 0.08) 205deg, 
            rgba(255, 255, 255, 0) 230deg, 
            rgba(255, 255, 255, 0) 360deg
          ),
          /* Concentric vinyl layers (rim, grooves, run-out) */
          radial-gradient(
            circle at center,
            transparent 0%,
            transparent 36%,     /* Cover for label area */
            #16161a 36.5%,       /* Run-out groove starts */
            #0d0d10 39%,
            #16161a 41%,         /* Run-out groove ends */
            transparent 41.5%,
            transparent 96%,     /* Grooves end */
            #0d0d10 96.5%,       /* Outer rim starts */
            #16161a 100%         /* Outer rim ends */
          ),
          /* Repeating grooves texture inside the grooved area */
          repeating-radial-gradient(
            circle at center, 
            #121216 0px, 
            #121216 1.5px, 
            #22222a 2.5px, 
            #121216 3px
          );
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.05);
        animation: spin 3s linear infinite;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #loader .label {
        position: absolute;
        width: 66px;
        height: 66px;
        border-radius: 50%;
        background: #ea580c;
        border: 2px solid #0d0d10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 0 8px rgba(0,0,0,0.4);
      }
      #loader .label-brand {
        font-family: monospace, system-ui;
        font-size: 8px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 0.1em;
        margin-bottom: 2px;
        text-transform: uppercase;
        pointer-events: none;
      }
      #loader .label-detail {
        font-family: system-ui, sans-serif;
        font-size: 5px;
        color: rgba(255, 255, 255, 0.85);
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 3px;
        pointer-events: none;
      }
      #loader .label-hole {
        width: 6px;
        height: 6px;
        background: #f4f4f2;
        border-radius: 50%;
        border: 1px solid rgba(0,0,0,0.6);
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
        pointer-events: none;
      }
      #loader p {
        margin-top: 20px;
        font-size: 10px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #71717a;
        font-weight: 600;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen (removed by React on mount) -->
    <div id="loader">
      <div class="vinyl-wrapper">
        <div class="disc">
          <div class="label">
            <div class="label-brand">WAXROOM</div>
            <div class="label-detail">STEREO • 33 RPM</div>
            <div class="label-hole"></div>
          </div>
        </div>
      </div>
      <p>Loading Waxroom</p>
    </div>

    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
